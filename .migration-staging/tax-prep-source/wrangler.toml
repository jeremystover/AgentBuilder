name = "tax-prep"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[limits]
subrequests = 10000

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "tax-prep-db"
database_id = "150d6758-92df-48fe-9654-47adfee09e12"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "tax-prep-files"

[vars]
DEFAULT_BANK_PROVIDER = "teller"
PLAID_ENV = "sandbox"
TELLER_ENV = "development"

# Secrets — set locally in .dev.vars, in prod via Cloudflare dashboard:
# PLAID_CLIENT_ID
# PLAID_SECRET
# TELLER_APPLICATION_ID
# ANTHROPIC_API_KEY

# Optional mTLS binding for Teller development/production environments:
[[mtls_certificates]]
binding = "TELLER_MTLS"
certificate_id = "1c40bf07-6ba7-4e8c-b95f-27df8e7adfda"
remote = true

[[secrets_store_secrets]]
binding = "ANTHROPIC_API_KEY"
store_id = "2d0cdafd98d04cfda3406a0195d6cc74"
secret_name = "ANTHROPIC_API_KEY"
