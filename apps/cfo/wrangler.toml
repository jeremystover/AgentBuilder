name = "cfo"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"

# Neon Postgres via Hyperdrive. Create the Hyperdrive config in the
# Cloudflare dashboard pointing at the Neon connection string, then paste
# the generated id below. See docs/setup-neon.md.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "e142673e253a4e12a60cc3f42d78e26c"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "cfo-storage"

[[queues.producers]]
binding = "SCENARIO_QUEUE"
queue = "cfo-scenarios"

# Consumes the same queue — the Worker's queue() handler runs the
# projection engine asynchronously, off the request path.
[[queues.consumers]]
queue = "cfo-scenarios"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 1

# Shared fleet-wide D1 — observability tables (cron_runs, cron_errors).
# Read by the AgentBuilder dashboard.
[[d1_databases]]
binding = "AGENTBUILDER_CORE_DB"
database_name = "agentbuilder-core"
database_id = "51a422d2-e9ea-46e8-b6c8-233229434eca"

# Per-agent D1 for the Google OAuth token vault. Created with:
#   wrangler d1 create cfo-tokens
# then apply schema/d1/google-tokens.sql via:
#   wrangler d1 execute cfo-tokens --remote --file=schema/d1/google-tokens.sql
[[d1_databases]]
binding = "TOKENS"
database_name = "cfo-tokens"
database_id = "a5f97d39-80c5-4a5d-b4e9-10c445b7c7f5"

# mTLS binding for Teller development/production environments. The
# sandbox environment does not require it. Reuses the existing cert.
[[mtls_certificates]]
binding = "TELLER_MTLS"
certificate_id = "1c40bf07-6ba7-4e8c-b95f-27df8e7adfda"

[vars]
ENVIRONMENT = "production"
TELLER_ENV = "development"

# Cron triggers — handled in src/index.ts scheduled():
#   "0 9 * * *"     → nightly Teller sync (~05:00 ET)
#   "*/4 * * * *"   → keep-alive ping to prevent Neon auto-suspend
[triggers]
crons = ["0 9 * * *", "*/4 * * * *"]

# Secrets — set via `wrangler secret put`:
#   WEB_UI_PASSWORD            login password for the React SPA
#   EXTERNAL_API_KEY           bearer token for /api/v1/* without cookie
#   MCP_HTTP_KEY               bearer token for /mcp
#   ANTHROPIC_API_KEY          via fleet secrets store
#   TELLER_APPLICATION_ID      Teller Connect application id
#   GOOGLE_OAUTH_CLIENT_ID     fleet-wide Google OAuth client id
#   GOOGLE_OAUTH_CLIENT_SECRET fleet-wide Google OAuth client secret
#   GOOGLE_TOKEN_VAULT_KEK     base64-encoded AES-256 key for the D1 token vault
