name = "wired-watcher"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Daily cron — 7:00 America/Los_Angeles ≈ 14:00 UTC.
[triggers]
crons = ["30 14 * * *"]

# KV — watchlist of feeds + per-feed seen-id state for dedup
[[kv_namespaces]]
binding = "WIRED_STATE"
id = "REPLACE_WITH_KV_ID"

# D1 — credential vault (cookies)
# Create with: wrangler d1 create wired-watcher-vault
# Then `wrangler d1 execute wired-watcher-vault --file=./migrations/0001_init.sql`
[[d1_databases]]
binding = "VAULT_DB"
database_name = "wired-watcher-vault"
database_id = "REPLACE_WITH_D1_ID"

[vars]
RESEARCH_AGENT_URL = "https://research-agent.jsstover.workers.dev"
ENVIRONMENT        = "production"

# Secrets (set via wrangler secret put):
#   wrangler secret put WATCHER_API_KEY    — bearer token for this worker's REST API
#   wrangler secret put INTERNAL_SECRET    — must match research-agent's INTERNAL_SECRET
#   wrangler secret put KEK_BASE64         — base64 of 32 random bytes (vault KEK)
#                                            generate with: pnpm cred genkey
