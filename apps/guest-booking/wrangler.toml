name = "guest-booking"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (admin SPA + guest booking SPA) served from ./public.
# run_worker_first = true so the Worker sees every request first and can
# handle SSR routes like /book and /book/unit/:id that shadow no static file.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# D1 database - create with: wrangler d1 create booking_sync
[[d1_databases]]
binding = "DB"
database_name = "booking_sync"
database_id = "670c4fc8-1f95-42df-a4f1-2685ad2f224c"

# R2 bucket for listing photos - create with: wrangler r2 bucket create booking-sync-photos
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "booking-sync-photos"

# KV for session / cached iCal fetches
[[kv_namespaces]]
binding = "CACHE"
id = "50125c6edcf34dc2aaf08af27cce9aef"

# Cron triggers: pull remote calendars every 10 min
[triggers]
crons = ["*/10 * * * *"]

[vars]
APP_NAME = "Booking Sync Manager"
PUBLIC_BASE_URL = "https://www.thewhitfordhouse.com"
DEFAULT_CURRENCY = "USD"
SQUARE_ENV = "sandbox"  # flip to "production" when ready
# Secrets - set via `wrangler secret put <NAME>`:
#   ADMIN_TOKEN
#   MCP_HTTP_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   SQUARE_ACCESS_TOKEN
#   SQUARE_LOCATION_ID
#   SQUARE_WEBHOOK_SIGNATURE_KEY
# For local dev put them in a .dev.vars file.
