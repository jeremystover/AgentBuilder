name = "graphic-designer"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[limits]
cpu_ms = 300000

[assets]
directory = "./public"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "AGENT_DO"
class_name = "GraphicDesignerDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GraphicDesignerDO"]

# Create with: wrangler d1 create graphic-designer-db
[[d1_databases]]
binding = "DB"
database_name = "graphic-designer-db"
database_id = "c8ce3cda-69a8-4045-a05d-7bfd899aa19e"

# Create with: wrangler r2 bucket create graphic-designer-assets
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "graphic-designer-assets"

[ai]
binding = "AI"

# Secrets — enter via `wrangler secret put`:
#   ANTHROPIC_API_KEY            (fleet shared — LLM client)
#   MCP_HTTP_KEY                 (for /mcp auth from Claude custom tool)
#   OPENAI_API_KEY               (gpt-image-1 for logo concepts + AI images)
#   UNSPLASH_ACCESS_KEY          (stock photo search)
#   PEXELS_API_KEY               (stock photo search)
#   CANVA_API_KEY                (Canva Connect API for brand kit export)
#   GOOGLE_TOKEN_VAULT_KEK       (fleet shared — base64 32-byte AES-256 key)
#   GOOGLE_OAUTH_CLIENT_ID       (fleet shared Google OAuth client)
#   GOOGLE_OAUTH_CLIENT_SECRET   (fleet shared Google OAuth secret)
#
# After deploy, bootstrap Google access for user "default" by visiting:
#   https://graphic-designer.<account>.workers.dev/api/auth/google/start?userId=default
# Make sure the OAuth client has /api/auth/google/callback registered as a redirect URI.
