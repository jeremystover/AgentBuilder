name = "termination-documentation"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "AGENT_DO"
class_name = "TerminationDocumentationDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TerminationDocumentationDO"]

[ai]
binding = "AI"

# Shared D1 database for the Google token vault. Set database_id before deploying.
# [[d1_databases]]
# binding = "DB"
# database_name = "agentbuilder-core"
# database_id = "REPLACE_WITH_DB_ID"
#
# Required secrets (set via `wrangler secret put <NAME> --name termination-documentation`):
#   MCP_HTTP_KEY           — bearer token Claude.ai sends to /mcp
#   ANTHROPIC_API_KEY      — for the /chat passthrough LLM calls
#   GOOGLE_TOKEN_VAULT_KEK — base64 AES-256 KEK (same value used by other Google-touching agents)
