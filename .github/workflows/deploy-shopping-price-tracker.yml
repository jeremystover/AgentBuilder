name: Deploy shopping-price-tracker

# Generated by `pnpm create-agent`. Delegates to the reusable workflow at
# .github/workflows/_deploy-agent.yml. Set CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID in repository secrets before the first push.
#
# If this agent uses D1, set `d1_database` below to the database_name
# from apps/shopping-price-tracker/wrangler.toml. Leave empty ('') to skip
# migrations. Migrations live in apps/shopping-price-tracker/migrations/.

on:
  push:
    branches: [main]
    paths:
      - 'apps/shopping-price-tracker/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-shopping-price-tracker.yml'
      - '.github/workflows/_deploy-agent.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-agent.yml
    with:
      agent_id: shopping-price-tracker
      d1_database: 'shopping-price-tracker-db'
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
