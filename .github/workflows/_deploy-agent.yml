name: Deploy Agent (reusable)

# Reusable workflow that deploys a single agent Worker to Cloudflare and,
# when the agent has a `migrations/` directory, applies pending D1
# migrations before the deploy. Per-agent workflows under this directory
# call this one with their own `agent_id` / `d1_database` inputs.
#
# For Neon (Postgres) databases: pass neon_migrations: true and supply the
# NEON_DATABASE_URL secret. The agent must have scripts/migrate.ts and a
# "migrate" npm script (see apps/cfo for the reference implementation).

on:
  workflow_call:
    inputs:
      agent_id:
        description: Directory name under apps/ (also the Worker name).
        required: true
        type: string
      d1_database:
        description: D1 database name to migrate. Leave empty to skip migrations.
        required: false
        type: string
        default: ''
      neon_migrations:
        description: Set to true to run scripts/migrate.ts against Neon before deploy.
        required: false
        type: boolean
        default: false
      health_path:
        description: Path curl'd after deploy to confirm the Worker is live.
        required: false
        type: string
        default: '/health'
      node_version:
        description: Node.js version used to install deps and run wrangler.
        required: false
        type: string
        default: '20'
      pnpm_version:
        description: pnpm version (keep in sync with the root package.json).
        required: false
        type: string
        default: '9.12.0'
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      NEON_DATABASE_URL:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets (if any)
        working-directory: apps/${{ inputs.agent_id }}
        run: pnpm run --if-present web:build

      - name: Apply D1 migrations
        if: inputs.d1_database != '' && hashFiles(format('apps/{0}/migrations/**/*.sql', inputs.agent_id)) != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ inputs.agent_id }}
          command: d1 migrations apply ${{ inputs.d1_database }} --remote

      - name: Apply Neon migrations
        if: inputs.neon_migrations == true && env.NEON_DATABASE_URL != ''
        working-directory: apps/${{ inputs.agent_id }}
        env:
          DATABASE_URL: ${{ env.NEON_DATABASE_URL }}
        run: pnpm run migrate

      - name: Deploy Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ inputs.agent_id }}
          command: deploy

      # Liveness check from the GitHub runner (which has outbound internet).
      # Connection failure or any 5xx fails the job.
      - name: Smoke test
        id: smoke
        if: steps.deploy.outcome == 'success'
        env:
          HEALTH_URL: https://${{ inputs.agent_id }}.jsstover.workers.dev${{ inputs.health_path }}
        run: |
          echo "Smoke testing $HEALTH_URL"
          CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$HEALTH_URL" || echo "000")
          echo "HTTP $CODE"
          if [ "$CODE" = "000" ] || [ "$CODE" -ge 500 ]; then
            echo "::error::Smoke test failed (HTTP $CODE)"
            exit 1
          fi

      # Record the outcome into agentbuilder-core D1 so Claude Code web
      # sessions can confirm the deploy by querying D1 (curl is blocked there).
      - name: Record deployment
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AGENT_ID: ${{ inputs.agent_id }}
          GIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          if [ "$DEPLOY_OUTCOME" = "success" ]; then STATUS=success; else STATUS=failed; fi
          case "$SMOKE_OUTCOME" in
            success) SMOKE=ok ;;
            skipped) SMOKE=skipped ;;
            *)       SMOKE=fail ;;
          esac
          DEPLOY_ID="${AGENT_ID}-${GIT_SHA:0:12}-${RUN_ID}"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Ensure the table exists — only agent-builder's workflow migrates
          # agentbuilder-core, but every agent's deploy writes here.
          npx wrangler d1 execute agentbuilder-core --remote --command \
            "CREATE TABLE IF NOT EXISTS deployments (deploy_id TEXT PRIMARY KEY, agent_id TEXT NOT NULL, git_sha TEXT NOT NULL, version_id TEXT DEFAULT '', status TEXT NOT NULL, smoke_status TEXT DEFAULT '', deployed_at TEXT NOT NULL, actor TEXT DEFAULT '', notes TEXT DEFAULT '')"
          npx wrangler d1 execute agentbuilder-core --remote --command \
            "INSERT INTO deployments (deploy_id, agent_id, git_sha, status, smoke_status, deployed_at, actor) VALUES ('${DEPLOY_ID}', '${AGENT_ID}', '${GIT_SHA}', '${STATUS}', '${SMOKE}', '${NOW}', '${ACTOR}')"
