name: Deploy linkedin-watcher

on:
  push:
    branches: [main]
    paths:
      - 'apps/linkedin-watcher/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-linkedin-watcher.yml'
      - '.github/workflows/_deploy-agent.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-agent.yml
    with:
      agent_id: linkedin-watcher
      d1_database: ''
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
