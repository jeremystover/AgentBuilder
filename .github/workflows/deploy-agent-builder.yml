name: Deploy agent-builder

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent-builder/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-agent-builder.yml'
      - '.github/workflows/_deploy-agent.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-agent.yml
    with:
      agent_id: agent-builder
      d1_database: agentbuilder-core
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
