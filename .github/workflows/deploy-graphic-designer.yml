name: Deploy graphic-designer

# Generated by `pnpm create-agent`. Delegates to the reusable workflow at
# .github/workflows/_deploy-agent.yml. Set CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID in repository secrets before the first push.
#
# If this agent uses D1, set `d1_database` below to the database_name
# from apps/graphic-designer/wrangler.toml. Leave empty ('') to skip
# migrations. Migrations live in apps/graphic-designer/migrations/.

on:
  push:
    branches: [main]
    paths:
      - 'apps/graphic-designer/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-graphic-designer.yml'
      - '.github/workflows/_deploy-agent.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-agent.yml
    with:
      agent_id: graphic-designer
      d1_database: 'graphic-designer-db'
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
